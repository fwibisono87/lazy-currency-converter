services:
  lazy-currency-converter-server:
    build:
      context: ./server
    container_name: lazy-currency-converter-server
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - ./.env
    environment:
      PORT: 8787
      EXCHANGE_RATE_TTL_HOURS: ${EXCHANGE_RATE_TTL_HOURS:-48}
      EXTENSION_DIR: /app/extension
    volumes:
      - lcc_server_cache:/app/data
      - ./extension:/app/extension:ro

volumes:
  lcc_server_cache:
